services:
  # 1. محاكي S3 الجديد (MinIO)
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"   
      - "9001:9001"   
    environment:
      - MINIO_ROOT_USER=test
      - MINIO_ROOT_PASSWORD=testpassword
    command: server /data --console-address ":9001"

  api:
    build: ./api
    env_file:
      - .env
    depends_on:
      - minio

  agent:
    build: ./agent
    ports:
      - "8080:8080"
    depends_on:
      - api

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - agent

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus